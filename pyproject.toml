[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["cache", "out", "snap_cache"]

[tool.ruff.lint]
select = ["E", "F", "W", "I001"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
filterwarnings = [
  "ignore::DeprecationWarning:yfinance",
]
